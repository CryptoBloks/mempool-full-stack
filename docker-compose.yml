version: '3.8'

services:
  bitcoin:
    image: ruimarinho/bitcoin-core:latest
    container_name: bitcoin-core
    volumes:
      - ./data/bitcoin:/home/bitcoin/.bitcoin
      - ./config/bitcoin:/home/bitcoin/.bitcoin
    expose:
      - "8332"  # RPC (internal only)
      - "8333"  # P2P (internal only)
    ports:
      - "8333:8333"  # P2P (external access needed for Bitcoin network)
    command: >
      -printtoconsole
      -server=1
      -rpcallowip=172.16.0.0/12
      -rpcbind=0.0.0.0
      -rpcuser=${BITCOIN_RPC_USER}
      -rpcpassword=${BITCOIN_RPC_PASSWORD}
    networks:
      bitcoin_network:
        ipv4_address: 172.16.0.2
    healthcheck:
      test: ["CMD", "bitcoin-cli", "getblockchaininfo"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

  fulcrum:
    image: cculianu/fulcrum:latest
    container_name: fulcrum
    volumes:
      - ./data/fulcrum:/data
      - ./config/fulcrum:/config
    expose:
      - "50001"  # Electrum protocol (internal only)
      - "50002"  # SSL (internal only)
    command: >
      --bitcoind=bitcoin:8332
      --bitcoind-user=${BITCOIN_RPC_USER}
      --bitcoind-pass=${BITCOIN_RPC_PASSWORD}
      --tcp=0.0.0.0:50001
      --ssl=0.0.0.0:50002
      --ssl-cert=/config/fulcrum.cert
      --ssl-key=/config/fulcrum.key
    networks:
      bitcoin_network:
        ipv4_address: 172.16.0.3
    depends_on:
      bitcoin:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "50001"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

  mariadb:
    image: mariadb:10.6
    container_name: mariadb
    volumes:
      - ./data/mariadb:/var/lib/mysql
      - ./config/mariadb/init:/docker-entrypoint-initdb.d
      - ./config/mariadb/my.cnf:/etc/mysql/conf.d/my.cnf
    expose:
      - "3306"  # MariaDB (internal only)
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    networks:
      bitcoin_network:
        ipv4_address: 172.16.0.4
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

  mempool:
    image: mempool/mempool:latest
    container_name: mempool
    volumes:
      - ./data/mempool:/data
      - ./config/mempool:/config
    ports:
      - "80:80"  # Only expose the web interface
    environment:
      - BITCOIN_RPC_USER=${BITCOIN_RPC_USER}
      - BITCOIN_RPC_PASSWORD=${BITCOIN_RPC_PASSWORD}
    networks:
      bitcoin_network:
        ipv4_address: 172.16.0.5
    depends_on:
      bitcoin:
        condition: service_healthy
      fulcrum:
        condition: service_healthy
      mariadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/api/v1/fees/recommended"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

networks:
  bitcoin_network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.16.0.0/16
    driver_opts:
      com.docker.network.bridge.name: bitcoin_net
      com.docker.network.bridge.enable_icc: "true"
      com.docker.network.bridge.enable_ip_masquerade: "true" 