# Fulcrum Configuration File

# Bitcoin Core RPC connection
bitcoind = bitcoin:8332
bitcoind_user = ${BITCOIN_RPC_USER}
bitcoind_pass = ${BITCOIN_RPC_PASSWORD}

# Server settings
tcp = 0.0.0.0:50001
ssl = 0.0.0.0:50002
ssl_cert = /config/fulcrum.cert
ssl_key = /config/fulcrum.key

# Performance
db_dir = /data
fast_sync = 1
max_connections = 1000
max_history = 1000
max_mempool = 1000

# Logging
log_level = info
log_file = /data/fulcrum.log 